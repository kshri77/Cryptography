<!DOCTYPE html>
<html>
<head>
    <title>MD5 Step by Step</title>
    <style>
        body { font-family: Arial; background: #e8f5e9; padding: 20px; }
        .box { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        textarea { width: 100%; height: 60px; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #2e7d32; color: white; border: none; cursor: pointer; }
        pre { background: #fafafa; padding: 15px; height: 450px; overflow-y: auto; font-size: 12px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="box">
    <h2>MD5 Step by Step</h2>
    <textarea id="input">abc</textarea>
    <button onclick="run()">Generate MD5 Hash</button>
    <pre id="output"></pre>
</div>

<script>
// MD5 Sine-based constants
const K = Array.from({length: 64}, (_, i) => Math.floor(Math.abs(Math.sin(i + 1)) * 4294967296) >>> 0);
// Left rotation amounts
const S = [7, 12, 17, 22, 7, 12, 17, 22, 7, 12, 17, 22, 7, 12, 17, 22,
           5,  9, 14, 20, 5,  9, 14, 20, 5,  9, 14, 20, 5,  9, 14, 20,
           4, 11, 16, 23, 4, 11, 16, 23, 4, 11, 16, 23, 4, 11, 16, 23,
           6, 10, 15, 21, 6, 10, 15, 21, 6, 10, 15, 21, 6, 10, 15, 21];

function run() {
    let out = "";
    const log = (m) => out += m + "\n";
    let msg = document.getElementById("input").value;
    let data = Array.from(new TextEncoder().encode(msg));

    log("Input: " + msg);

    // Initial 32-bit Buffers (A, B, C, D)
    let a0 = 0x67452301, b0 = 0xefcdab89, c0 = 0x98badcfe, d0 = 0x10325476;
    log(`Initial: A=${a0.toString(16)} B=${b0.toString(16)} C=${c0.toString(16)} D=${d0.toString(16)}\n`);

    // Padding logic
    let bitLen = data.length * 8;
    data.push(0x80);
    while (data.length % 64 !== 56) data.push(0);
    for (let i = 0; i < 8; i++) data.push((bitLen >>> (i * 8)) & 0xff);

    for (let offset = 0; offset < data.length; offset += 64) {
        let w = new Uint32Array(16);
        for (let i = 0; i < 16; i++) {
            w[i] = data[offset + i*4] | (data[offset + i*4+1] << 8) | 
                   (data[offset + i*4+2] << 16) | (data[offset + i*4+3] << 24);
        }

        let a = a0, b = b0, c = c0, d = d0;

        for (let i = 0; i < 64; i++) {
            let f, g;
            if (i < 16) {
                f = (b & c) | ((~b) & d);
                g = i;
            } else if (i < 32) {
                f = (d & b) | ((~d) & c);
                g = (5 * i + 1) % 16;
            } else if (i < 48) {
                f = b ^ c ^ d;
                g = (3 * i + 5) % 16;
            } else {
                f = c ^ (b | (~d));
                g = (7 * i) % 16;
            }

            let temp = (a + f + K[i] + w[g]) >>> 0;
            a = d;
            d = c;
            c = b;
            b = (b + ((temp << S[i]) | (temp >>> (32 - S[i])))) >>> 0;

            log(`Step ${i.toString().padStart(2,'0')}: A=${(a>>>0).toString(16).padStart(8,'0')} B=${(b>>>0).toString(16).padStart(8,'0')} C=${(c>>>0).toString(16).padStart(8,'0')} D=${(d>>>0).toString(16).padStart(8,'0')}`);
        }
        a0 = (a0 + a) >>> 0; b0 = (b0 + b) >>> 0; c0 = (c0 + c) >>> 0; d0 = (d0 + d) >>> 0;
    }

    const toHex = (n) => Array.from({length:4}, (_,i) => ((n>>>(i*8))&0xff).toString(16).padStart(2,'0')).join('');
    log(`\nFinal MD5: ${toHex(a0)}${toHex(b0)}${toHex(c0)}${toHex(d0)}`);
    document.getElementById("output").textContent = out;
}
</script>
</body>
</html>
